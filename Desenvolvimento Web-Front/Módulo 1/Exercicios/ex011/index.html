<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Document</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>tente abrir esse site em vários dispositivo diferetens ou simplesmente aumente e diminua o tamanho do seu navegador</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexivel">
    </picture>
    <h1>Reproduzindo audio</h1>
    <p>Vamos aprendera reproduzir audio em HTML5</p>
    <audio preload="metadata" autoplay controls>
        <source src="midia/Floating Lanterns - The Mini Vandals.mp3" type="audio/mpeg">
        <p>infelizmente seu navegador não consegue reproduzir audio. <a href="midia/Floating Lanterns - The Mini Vandals.mp3">Clique aqui para baixar o arquivo mp3</a></p>
    </audio>
</body>
</html>
